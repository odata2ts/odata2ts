name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    types: [assigned, opened, synchronize, reopened]

jobs:
  test:
    name: Testing With Coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node: [24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install packages
        run: yarn --immutable
      - name: Build packages
        run: yarn build
      - name: Type Test
        run: yarn test-compile
      - name: Check Circular Deps
        run: yarn check-circular-deps
      - name: Run Tests
        run: yarn coverage
      - name: Coveralls
        uses: coverallsapp/github-action@v1.1.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  ts-floor-check:
    name: TypeScript Floor Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install packages
        run: yarn --immutable
      - name: Build packages
        run: yarn build
      - name: Install floor TypeScript version
        run: yarn workspace @odata2ts/example-ts-floor-check run install-floor-ts
      - name: Verify generated output type-checks under the declared minimum TypeScript version
        run: yarn workspace @odata2ts/example-ts-floor-check run int-test
