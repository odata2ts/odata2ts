name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    types: [assigned, opened, synchronize, reopened]

jobs:
  test:
    name: Unit Tests With Coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node: [ 20 ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install packages
        run: yarn --immutable
      - name: Build packages
        run: yarn build
      - name: Type Test
        run: yarn test-compile
      - name: Check Circular Deps
        run: yarn check-circular-deps
      - name: Run Tests
        run: yarn coverage
      - name: Coveralls
        uses: coverallsapp/github-action@v1.1.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Integration tests run against real OData servers and are by far the most expensive part of the
  # pipeline, so they form a separate stage that only starts once the unit tests are green. They live
  # in their own workflow file and are pulled in here, because `needs:` cannot order across workflows.
  integration-test:
    name: Integration Tests
    needs: test
    uses: ./.github/workflows/integration-test.yml
